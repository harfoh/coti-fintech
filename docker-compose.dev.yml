
services:
  coti-payment-api:
    image: ${IMAGE_NAME:-coti-fintech-payment-api}:${IMAGE_TAG:-latest}
    container_name: coti-payment-api-dev
    ports:
      - "8001:8000"
    environment:
      - ENV=dev
      - APP_VERSION=${IMAGE_TAG:-dev}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - coti-fintech-dev-net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: coti-nginx-dev
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      coti-payment-api:
        condition: service_healthy
    networks:
      - coti-fintech-dev-net
    restart: unless-stopped

networks:
  coti-fintech-dev-net:
    driver: bridge
